<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Signup | AI Startup Analyzer</title><style>*{box-sizing:border-box}body{margin:0;min-height:100vh;font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;background:radial-gradient(circle at top right,#ccfbf1,#f8fafc 42%,#e0e7ff);display:grid;place-items:center;padding:24px;color:#0f172a}.card{width:100%;max-width:450px;background:rgba(255,255,255,.84);backdrop-filter:blur(22px);border:1px solid #dbe5f2;border-radius:28px;padding:34px;box-shadow:0 28px 80px rgba(15,23,42,.14)}.logo{width:54px;height:54px;border-radius:18px;background:linear-gradient(135deg,#2563eb,#14b8a6);display:grid;place-items:center;color:white;font-weight:900;margin:0 auto 16px}h1{text-align:center;margin:0;font-size:28px;letter-spacing:-.05em}.sub{text-align:center;color:#64748b;margin:8px 0 26px}.error{background:#fee2e2;color:#991b1b;border:1px solid #fecaca;border-radius:14px;padding:12px;margin-bottom:16px}label{display:block;font-weight:800;font-size:13px;margin:14px 0 7px}input{width:100%;border:1px solid #dbe5f2;border-radius:16px;padding:14px;background:#f8fafc;font:inherit;outline:none}input:focus{border-color:#2563eb;box-shadow:0 0 0 4px rgba(37,99,235,.12)}button{width:100%;border:0;border-radius:16px;padding:14px;background:linear-gradient(135deg,#2563eb,#14b8a6);color:white;font-weight:900;font-size:15px;margin-top:20px;cursor:pointer}p.bottom{text-align:center;color:#64748b;margin:22px 0 0}a{color:#2563eb;font-weight:900;text-decoration:none}</style></head><body><form class="card" method="POST"><div class="logo">AI</div><h1>Create account</h1><p class="sub">Start generating beautiful startup feasibility reports</p>{% if error %}<div class="error">{{ error }}</div>{% endif %}<label>Email</label><input type="email" name="email" placeholder="Enter your email" required><label>Phone</label><input type="tel" name="phone" placeholder="Enter your phone number" required><label>Password</label><input type="password" name="password" placeholder="Create a password" required><button type="submit">Signup</button><p class="bottom">Already have an account? <a href="/login">Login</a></p></form></body></html>
